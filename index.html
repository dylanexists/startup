<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RentItBest HTML</title>
        <link href="./dist/output.css" rel="stylesheet"/>
    </head>
    <body>

        <header class="bg-blue-200">
            <h1 class="text-4xl font-bold tracking-tight text-gray-900">
                RentItBest</h1>
            <nav>
                <menu>
                    <li><a href="index.html">Login</a></li>
                    <li><a href="find-apartment.html">Find an Apartment</a></li>
                </menu>
            </nav>
        </header>

        <main class="flex flex-col justify-center items-center h-screen">
            <h1 class="text-5xl font-bold tracking-tight text-gray-900">
                Welcome to RentItBest</h1>
            <h2 class="text-2xl font-bold tracking-tight text-gray-900">
                The Best Rental Solution for Tenants and Landlords Alike</h2>
            <img src="https://images.unsplash.com/photo-1613490493576-7fde63acd811?w=800" alt="Fancy Apartment" width="300px">
            <form method="get">
                <h4>Login</h4>
                <div>
                    <span>Email</span>
                    <input type="text" placeholder="your@email.com" required/>
                </div>
                <div>
                    <span>Password</span>
                    <input type="password" placeholder="password" required/>
                </div>
                <button type="submit" formaction="user-dashboard.html">Login as User</button>
                <button type="submit" formaction="admin-dashboard.html">Login as Admin</button>
            </form>
            <div>
                <h4>Don't have an account/apartment?</h4>
                <a href="find-apartment.html">Come find an apartment!</a>
            </div>
            <br>
        </main>

        <footer>
            <hr />
            <span>Dylan Steenhoek</span>
            <br />
            <a href="https://github.com/dylanexists/startup">GitHub</a>
        </footer>
    </body>
</html>
