        <header>

        <main>
            <h1>Welcome to RentItBest</h1>

                <div>
                    <span>Email</span>
                    <input type="text" placeholder="your@email.com" required/>

                <div>
                    <span>Password</span>
                    <input type="password" placeholder="password" required/>
                </div>
                <button type="submit" formaction="user-dashboard.html">Login as User</button>
                <button type="submit" formaction="admin-dashboard.html">Login as Admin</button>
            </form>
            <div>
                <h4>Don't have an account/apartment?</h4>
                <a href="find-apartment.html">Come find an apartment!</a>
            </div>
            <br>
        </main>

        <footer>
